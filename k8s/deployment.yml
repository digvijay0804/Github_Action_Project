kind: Deployment
apiVersion: apps/v1
metadata:
  name: web-app-deployment
  namespace: web-app

spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app

  template:
    metadata:
      labels:
        app: web-app

    spec:
      containers:
      - name: web-app
        image: digvijay0804/github:latest
        ports:
        - containerPort: 80
